<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spectra YOLO Control</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="panel">
      <header>
        <p class="eyebrow">SPECTRA YOLO</p>
        <div id="connection-card" class="connection-card disconnected">
          <span class="connection-dot" aria-hidden="true"></span>
          <div>
            <strong id="connection-title">YOLO disconnected</strong>
            <p id="connection-detail">Waiting for the detector process...</p>
          </div>
        </div>
        <h1>YOLO control</h1>
        <p class="subtitle">
          Switch between realtime single-target tracking and a started object
          queue.
        </p>
      </header>

      <form id="settings-form">
        <section class="mode-card">
          <div class="mode-tabs" role="radiogroup" aria-label="YOLO mode">
            <label>
              <input type="radio" name="controlMode" value="single" checked>
              <span>Single</span>
            </label>
            <label>
              <input type="radio" name="controlMode" value="queue">
              <span>Queue</span>
            </label>
          </div>
        </section>

        <section id="single-panel" class="picker-card">
          <label for="targetClass">Live target</label>
          <select id="targetClass" name="targetClass"></select>
        </section>

        <section id="queue-panel" class="queue-card" hidden>
          <label for="queueTarget">Queued targets</label>
          <div class="queue-add-row">
            <select id="queueTarget" name="queueTarget"></select>
            <button id="add-queue-target" type="button">Add</button>
          </div>
          <div id="queue-list" class="queue-list" aria-live="polite"></div>
          <div class="queue-actions">
            <button id="start-queue" type="button">Start</button>
            <button id="stop-queue" type="button">Stop</button>
          </div>
        </section>

        <section class="controls">
          <label>
            <span>
              Confidence threshold
              <output id="confidence-value"></output>
            </span>
            <input
              id="confidence"
              name="confidence"
              type="range"
              min="0.05"
              max="0.95"
              step="0.01"
            >
            <p class="control-help">
              Higher values are stricter and reduce false detections; lower
              values are more sensitive but may detect wrong objects.
            </p>
          </label>
        </section>

        <div class="status-row">
          <div id="target-badge" class="target-badge">--</div>
          <div id="queue-badge" class="target-badge" hidden>Queue idle</div>
          <p id="status" role="status">Loading settings...</p>
        </div>
      </form>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
